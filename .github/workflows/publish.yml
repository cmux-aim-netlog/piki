name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Compute SHA256
        id: sha
        run: |
          FILE=$(ls dist/*.tar.gz)
          echo "sha256=$(sha256sum $FILE | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TAP_GITHUB_TOKEN }}
          script: |
            const version = "${{ steps.sha.outputs.version }}";
            const sha256 = "${{ steps.sha.outputs.sha256 }}";
            const url = `https://files.pythonhosted.org/packages/source/p/piki/piki-${version}.tar.gz`;

            const { data: file } = await github.rest.repos.getContent({
              owner: "cmux-aim-netlog",
              repo: "homebrew-tap",
              path: "Formula/piki.rb",
            });

            const content = Buffer.from(file.content, "base64").toString();
            const updated = content
              .replace(/url ".*"/, `url "${url}"`)
              .replace(/sha256 ".*"/, `sha256 "${sha256}"`);

            await github.rest.repos.createOrUpdateFileContents({
              owner: "cmux-aim-netlog",
              repo: "homebrew-tap",
              path: "Formula/piki.rb",
              message: `chore: bump piki to ${version}`,
              content: Buffer.from(updated).toString("base64"),
              sha: file.sha,
            });
